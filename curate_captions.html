<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Huakaʻi — Curate Captions</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
    body { background: #faf7f2; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .card { transition: transform 0.1s ease; }
    .card.marked-delete { opacity: 0.5; }
    .card.marked-delete .img-wrap { box-shadow: 0 0 0 4px #d84315 inset; }
    .card.marked-delete .img-wrap::after {
        content: "DELETE";
        position: absolute; top: 50%; left: 50%;
        transform: translate(-50%, -50%) rotate(-12deg);
        background: #d84315; color: #fff; font-weight: 900;
        font-size: 24px; padding: 5px 14px; letter-spacing: 0.05em;
        border: 3px solid #fff; border-radius: 6px; z-index: 5;
        pointer-events: none;
    }
    .card.changed .name-input {
        background: #fff8e1;
        border-color: #ffa000;
    }
    .img-wrap {
        position: relative; aspect-ratio: 4 / 3;
        background: #e8e1d6; cursor: pointer; overflow: hidden;
    }
    .img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .img-wrap .placeholder {
        position: absolute; inset: 0;
        display: flex; align-items: center; justify-content: center;
        background: #8d6e63; color: #fff; font-weight: 700; font-size: 12px;
    }
    .name-input {
        font-weight: 700; font-size: 13px; line-height: 1.3;
        background: #fff; border: 1px solid #e8e1d6;
        border-radius: 6px; padding: 6px 8px; width: 100%;
        outline: none;
    }
    .name-input:focus { border-color: #00838F; }
    .row-label {
        font-size: 9px; font-weight: 800; letter-spacing: 0.08em;
        color: #8a8580; text-transform: uppercase;
    }
    .original {
        font-size: 11px; color: #6b6660; line-height: 1.35;
        background: rgba(15, 23, 42, 0.04);
        padding: 4px 6px; border-radius: 4px;
    }
    .suggested {
        font-size: 12px; color: #1f2937; line-height: 1.35;
        background: #e8f4f5; padding: 4px 6px; border-radius: 4px;
        border-left: 3px solid #00838F;
        cursor: pointer;
    }
    .suggested:hover { background: #d9eded; }
    .meta-row { font-size: 11px; color: #6b6660; line-height: 1.35; margin-top: 4px; }
    .toolbar {
        position: sticky; top: 0; z-index: 50;
        background: rgba(250,247,242,0.95);
        backdrop-filter: blur(8px);
        border-bottom: 1px solid #e8e1d6;
    }
    .summary-pill {
        display: inline-flex; align-items: center; gap: 6px;
        background: #fff; padding: 6px 12px; border-radius: 999px;
        font-size: 12px; font-weight: 700; border: 1px solid #e8e1d6;
    }
    .btn {
        background: #00838F; color: #fff; padding: 8px 14px;
        border-radius: 8px; font-weight: 700; font-size: 13px;
        border: none; cursor: pointer;
    }
    .btn:hover { filter: brightness(0.95); }
    .btn-secondary { background: #fff; color: #1a1614; border: 1px solid #e8e1d6; }
    select, input[type="text"] {
        background: #fff; border: 1px solid #e8e1d6;
        padding: 7px 10px; border-radius: 6px; font-size: 13px; outline: none;
    }
    select:focus, input[type="text"]:focus { border-color: #00838F; }
</style>
</head>
<body class="text-slate-900 min-h-screen">

<!-- Toolbar -->
<div class="toolbar px-4 py-3 flex flex-wrap items-center gap-3">
    <div>
        <h1 class="font-extrabold text-lg leading-none">Curate Captions</h1>
        <p class="text-xs text-slate-500 mt-0.5">Tap the suggestion to accept it. Edit the field to refine. Click the photo to delete.</p>
    </div>
    <div class="flex items-center gap-2 ml-auto flex-wrap">
        <input type="text" id="search" placeholder="Search…" class="w-40">
        <select id="filter-island"><option value="">All islands</option></select>
        <select id="filter-state">
            <option value="">Show all</option>
            <option value="diff">Only differs from original</option>
            <option value="changed">Only my edits</option>
            <option value="delete">Only marked delete</option>
        </select>
        <span class="summary-pill"><span id="visible-count">0</span> / <span id="total-count">0</span></span>
        <span class="summary-pill" style="background:#fef3e2; border-color:#ffa000; color:#7a3e00;">
            <span id="rename-count">0</span> rename
        </span>
        <span class="summary-pill" style="background:#ffebee; border-color:#d84315; color:#891a00;">
            <span id="delete-count">0</span> delete
        </span>
        <button class="btn-secondary btn" onclick="acceptAllSuggestions()">Accept all suggestions</button>
        <button class="btn-secondary btn" onclick="resetAll()">Reset</button>
        <button class="btn" onclick="generatePatch()">Generate patch</button>
    </div>
</div>

<!-- Patch output modal -->
<div id="patch-panel" class="hidden" style="position:fixed; inset:0; z-index:200; background:rgba(0,0,0,0.6); display:none; align-items:center; justify-content:center; padding:20px;" onclick="if(event.target===this) closePatch()">
    <div style="background:#fff; border-radius:14px; max-width:760px; width:100%; max-height:90vh; display:flex; flex-direction:column; overflow:hidden; box-shadow:0 30px 60px rgba(0,0,0,0.4);">
        <div class="flex items-center justify-between px-5 py-3 border-b border-slate-200">
            <p class="text-sm font-bold">Copy this and paste it back to Claude</p>
            <div class="flex gap-2">
                <button class="btn-secondary btn" onclick="copyPatch()">Copy to clipboard</button>
                <button class="btn-secondary btn" onclick="closePatch()">Close ✕</button>
            </div>
        </div>
        <div class="px-5 py-4 overflow-auto" style="flex:1;">
            <p id="patch-summary" class="text-xs text-slate-500 mb-2"></p>
            <textarea id="patch-output" class="w-full border border-slate-200 rounded p-3" style="height:50vh; font-family:ui-monospace,SFMono-Regular,monospace; font-size:12px;" readonly></textarea>
            <p id="copy-msg" class="text-xs text-emerald-700 mt-2 hidden">Copied.</p>
        </div>
    </div>
</div>

<!-- Cards grid -->
<div id="grid" class="grid gap-4 p-4" style="grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));"></div>

<script src="data/locations.js"></script>
<script>
const STORAGE_KEY = 'moku_match_captions_v1';
let state = loadState();

// Hand-crafted caption suggestions (loaded from data/caption_suggestions.json).
// Keys are the original name. If a name isn't in here we fall back to the
// regex cleanup below, and if that doesn't change anything we just show
// the original.
let HAND_SUGGESTIONS = {};
fetch('data/caption_suggestions.json')
    .then(r => r.json())
    .then(j => { HAND_SUGGESTIONS = j.suggestions || {}; render(); })
    .catch(() => { /* fall back to regex-only suggestions */ });

function loadState() {
    try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) return JSON.parse(raw);
    } catch (e) {}
    return { deletes: {}, edits: {} };  // edits[originalName] = newName
}
function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

const all = (window.LOCATIONS || []).slice();

// ---------- Caption suggestion logic ----------

const ISLAND_NAMES = [
    'Hawaiʻi','Hawaii','Hawai\'i','Hawai‘i',
    'Oʻahu','Oahu','O\'ahu',
    'Maui','Kauaʻi','Kauai','Kaua\'i',
    'Molokaʻi','Molokai','Moloka\'i',
    'Lānaʻi','Lanai','Lana\'i',
    'Niʻihau','Niihau','Ni\'ihau',
    'Kahoʻolawe','Kahoolawe','Kaho\'olawe',
    'Big Island','Big island'
];
const STATE_TAGS = ['HI','USA','U.S.A.','United States'];

function escapeRe(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

function stripTrailingGeo(s) {
    let prev = null;
    while (prev !== s) {
        prev = s;
        for (const tag of [...ISLAND_NAMES, ...STATE_TAGS]) {
            // ", Hawaii" or " Hawaii" at end (case-insensitive, allow trailing punctuation)
            s = s.replace(new RegExp('[,\\s]+' + escapeRe(tag) + '[\\s,.;-]*$', 'i'), '');
        }
        s = s.replace(/[\s,\-.;]+$/, '').trim();
    }
    return s;
}

function suggestCaption(name, island, moku, ahupuaa) {
    // Prefer the hand-crafted suggestion if there is one
    if (HAND_SUGGESTIONS && HAND_SUGGESTIONS[name]) {
        return HAND_SUGGESTIONS[name];
    }
    let s = (name || '').trim();
    if (!s) return '';

    // Leading timestamps like "2021-10-06 10 14 11" or "2013.11.01.113840"
    s = s.replace(/^\d{4}[.\-_]\d{2}[.\-_]\d{2}([.\s_]\d{2,6})*\s*[\-.]?\s*/, '');

    // "Flickr - <author> - " prefix
    s = s.replace(/^Flickr\s*[\-—]\s*[^\-—]+\s*[\-—]\s*/i, '');

    // Trailing " - panoramio …" markers
    s = s.replace(/\s*[\-—]\s*panoramio\b.*$/i, '');

    // Parenthetical numeric IDs (long numbers) and UUID-ish strings
    s = s.replace(/\s*\(\d{5,}\)/g, '');
    s = s.replace(/\s*\([a-f0-9]{6,}-[a-f0-9-]{6,}\)/gi, '');
    s = s.replace(/\s*\([a-f0-9]{8,}\)/gi, '');

    // Unsplash hash markers
    s = s.replace(/\s*\(Unsplash[^)]*\)/gi, '');

    // Trailing year-only pieces like "2007" or "2009-07"
    s = s.replace(/[\s,]\d{4}([\-/]\d{1,2})?\s*$/, '');

    // Extra "HDR", "explore", " - August 2010" type tags
    s = s.replace(/\s*[\-—]\s*August\s+\d{4}\s*$/i, '');
    s = s.replace(/\s+HDR\s*$/i, '');

    // Strip island/state suffix repeatedly
    s = stripTrailingGeo(s);

    // Strip ", Big island", ", Hawaii" repeated and embedded
    let prev = null;
    while (prev !== s) {
        prev = s;
        for (const tag of [...ISLAND_NAMES, ...STATE_TAGS]) {
            s = s.replace(new RegExp(',\\s*' + escapeRe(tag) + '\\b', 'gi'), '');
        }
    }

    // Normalize whitespace and trailing punctuation
    s = s.replace(/\s+/g, ' ').replace(/[\s,\-.;]+$/, '').trim();

    // Smart capitalization: if it's all lowercase, sentence-case it.
    if (s && s === s.toLowerCase()) {
        s = s.charAt(0).toUpperCase() + s.slice(1);
    }

    // If the cleaned name became too short or empty, anchor to the ahupuaʻa
    if (!s || s.length < 3) {
        s = `View in ${ahupuaa} (${moku})`;
    }

    // If the cleaned caption is just a generic word like "Beach", "Sunset",
    // append the ahupuaʻa for context.
    const generic = /^(beach|sunset|sunrise|view|valley|mountain|waterfall|surf|sea|ocean|coast|lava|panorama)\b/i;
    if (generic.test(s) && !s.toLowerCase().includes(ahupuaa.toLowerCase())) {
        s = `${s} at ${ahupuaa}`;
    }

    return s;
}

// ---------- Rendering ----------

function init() {
    document.getElementById('total-count').textContent = all.length;
    const islands = [...new Set(all.map(l => l.island))].sort();
    const sel = document.getElementById('filter-island');
    for (const i of islands) {
        const opt = document.createElement('option');
        opt.value = i; opt.textContent = i;
        sel.appendChild(opt);
    }
    document.getElementById('search').addEventListener('input', render);
    document.getElementById('filter-island').addEventListener('change', render);
    document.getElementById('filter-state').addEventListener('change', render);
    render();
}

function render() {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    const search = document.getElementById('search').value.trim().toLowerCase();
    const islandFilter = document.getElementById('filter-island').value;
    const stateFilter = document.getElementById('filter-state').value;

    let visible = 0;
    for (const loc of all) {
        if (islandFilter && loc.island !== islandFilter) continue;
        const isDelete = !!state.deletes[loc.name];
        const suggested = suggestCaption(loc.name, loc.island, loc.moku, loc.ahupuaa);
        const userEdit = state.edits[loc.name];
        const finalName = userEdit !== undefined ? userEdit : suggested;
        const isChanged = finalName !== loc.name;
        const differsFromOriginal = suggested !== loc.name;

        if (stateFilter === 'diff' && !differsFromOriginal) continue;
        if (stateFilter === 'changed' && userEdit === undefined) continue;
        if (stateFilter === 'delete' && !isDelete) continue;
        if (search) {
            const haystack = (loc.name + ' ' + suggested + ' ' + finalName + ' ' + loc.island + ' ' + loc.moku + ' ' + loc.ahupuaa).toLowerCase();
            if (!haystack.includes(search)) continue;
        }
        grid.appendChild(buildCard(loc, suggested, finalName, isChanged));
        visible++;
    }
    document.getElementById('visible-count').textContent = visible;
    document.getElementById('delete-count').textContent = Object.keys(state.deletes).length;
    document.getElementById('rename-count').textContent = countRenames();
}

function countRenames() {
    let n = 0;
    for (const loc of all) {
        const userEdit = state.edits[loc.name];
        if (userEdit !== undefined && userEdit !== loc.name) n++;
    }
    return n;
}

function buildCard(loc, suggested, finalName, isChanged) {
    const card = document.createElement('div');
    card.className = 'card bg-white rounded-xl border border-slate-200 overflow-hidden';
    if (state.deletes[loc.name]) card.classList.add('marked-delete');
    if (isChanged) card.classList.add('changed');

    const imgWrap = document.createElement('div');
    imgWrap.className = 'img-wrap';
    imgWrap.title = 'Click to toggle delete';
    imgWrap.onclick = () => toggleDelete(loc.name, card);
    const img = document.createElement('img');
    img.src = loc.img; img.alt = loc.name; img.loading = 'lazy';
    img.onerror = () => {
        img.style.display = 'none';
        const ph = document.createElement('div');
        ph.className = 'placeholder'; ph.textContent = 'IMAGE 404';
        imgWrap.appendChild(ph);
    };
    imgWrap.appendChild(img);
    card.appendChild(imgWrap);

    const body = document.createElement('div');
    body.className = 'p-3 space-y-1.5';

    // Original (read-only)
    body.appendChild(label('Original'));
    const orig = document.createElement('div');
    orig.className = 'original';
    orig.textContent = loc.name;
    body.appendChild(orig);

    // Suggested (click to accept)
    body.appendChild(label('Suggested (tap to use)'));
    const sug = document.createElement('div');
    sug.className = 'suggested';
    sug.textContent = suggested;
    sug.title = 'Tap to copy into the editable field below';
    sug.onclick = (e) => {
        e.stopPropagation();
        const input = card.querySelector('.name-input');
        input.value = suggested;
        input.dispatchEvent(new Event('input'));
    };
    body.appendChild(sug);

    // Editable final
    body.appendChild(label('Your version (will be saved)'));
    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'name-input';
    input.value = finalName;
    input.dataset.original = loc.name;
    input.onclick = e => e.stopPropagation();
    input.oninput = () => {
        const v = input.value.trim();
        if (v && v !== loc.name) {
            state.edits[loc.name] = v;
            card.classList.add('changed');
        } else {
            delete state.edits[loc.name];
            card.classList.remove('changed');
        }
        saveState();
        document.getElementById('rename-count').textContent = countRenames();
    };
    body.appendChild(input);

    // Meta
    const meta = document.createElement('div');
    meta.className = 'meta-row';
    meta.innerHTML = `<strong>${loc.island}</strong> · ${loc.moku} / ${loc.ahupuaa}`;
    body.appendChild(meta);

    card.appendChild(body);
    return card;
}

function label(text) {
    const el = document.createElement('div');
    el.className = 'row-label';
    el.textContent = text;
    return el;
}

function toggleDelete(name, card) {
    if (state.deletes[name]) {
        delete state.deletes[name];
        card.classList.remove('marked-delete');
    } else {
        state.deletes[name] = true;
        card.classList.add('marked-delete');
    }
    saveState();
    document.getElementById('delete-count').textContent = Object.keys(state.deletes).length;
}

function acceptAllSuggestions() {
    if (!confirm('Replace every editable field with the suggested version? Your existing edits will be overwritten.')) return;
    for (const loc of all) {
        const sug = suggestCaption(loc.name, loc.island, loc.moku, loc.ahupuaa);
        if (sug !== loc.name) {
            state.edits[loc.name] = sug;
        } else {
            delete state.edits[loc.name];
        }
    }
    saveState();
    render();
}

function resetAll() {
    if (!confirm('Clear all marks for delete and rename?')) return;
    state = { deletes: {}, edits: {} };
    saveState();
    render();
}

// ---------- Patch output ----------

function generatePatch() {
    const deletes = Object.keys(state.deletes).sort();
    const renames = [];
    for (const loc of all) {
        if (state.deletes[loc.name]) continue;       // don't rename something also marked delete
        const v = state.edits[loc.name];
        if (v !== undefined && v !== loc.name) {
            renames.push({ from: loc.name, to: v });
        }
    }
    const patch = {
        version: 1,
        generated_at: new Date().toISOString(),
        deletes: deletes,
        renames: renames,
    };
    document.getElementById('patch-output').value = JSON.stringify(patch, null, 2);
    document.getElementById('patch-summary').textContent =
        `${deletes.length} marked for delete, ${renames.length} marked for rename.`;
    const panel = document.getElementById('patch-panel');
    panel.classList.remove('hidden');
    panel.style.display = 'flex';
    setTimeout(() => document.getElementById('patch-output').select(), 50);
}

function closePatch() {
    const panel = document.getElementById('patch-panel');
    panel.classList.add('hidden');
    panel.style.display = 'none';
}

function copyPatch() {
    const out = document.getElementById('patch-output');
    out.select();
    let ok = false;
    try { ok = document.execCommand('copy'); } catch (e) {}
    if (!ok && navigator.clipboard) {
        navigator.clipboard.writeText(out.value).then(showCopied).catch(() => {});
        return;
    }
    showCopied();
}
function showCopied() {
    const msg = document.getElementById('copy-msg');
    msg.classList.remove('hidden');
    setTimeout(() => msg.classList.add('hidden'), 1800);
}

document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closePatch();
});

if (window.LOCATIONS) init();
else window.addEventListener('load', init);
</script>
</body>
</html>
